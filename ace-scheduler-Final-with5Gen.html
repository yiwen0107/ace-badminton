// ── App state ──────────────────────────────────────────────────────────────
let players=[], slot="19", ss=null, tab="tab1", editingId=null, pSearch="", pSort="level";
// Schedule history: { "19": [...up to 5 results], "21": [...] }, index per slot
const scheduleHistory = {"19":[], "21":[]};
let scheduleHistoryIdx = {"19":0, "21":0};

// ── Toast ──────────────────────────────────────────────────────────────────

// ── Tab / slot switching ───────────────────────────────────────────────────
function setTab(id){

}
function setSlot(s){
  slot=s; ss=loadSlot(s);
  render();
}

// ── SCHEDULING (Codex logic + balanced rest) ───────────────────────────────
function buildSchedule(players,cfg){
  const n=players.length, courts=cfg.courts, rounds=cfg.rounds;

  // Calculate effective players per round considering singles courts
  // Singles use 2 players, doubles use 4. Estimate singles courts per round for rest calc.
  const is21slot = cfg.slot === "21";
  const estSingles = !is21slot ? 0 : n >= 23 ? 0 : n >= 19 ? 1 : 2;
  const estDoubles = courts - estSingles;
  const maxOnEst = Math.min(n, estDoubles * 4 + estSingles * 2);
  const restPR = Math.max(0, n - maxOnEst);
  const totalRest = restPR * rounds;

  // Rest targets: base + leftover to weakest
  const tgt=new Map(), base=Math.floor(totalRest/n);
  players.forEach(p=>tgt.set(p.id,base));
  let lft=totalRest-base*n;
  const byWeak=players.slice().sort((a,b)=>LR[a.level]-LR[b.level]||a.name.localeCompare(b.name));
  for(let i=0;lft>0;i++,lft--) tgt.set(byWeak[i%byWeak.length].id, tgt.get(byWeak[i%byWeak.length].id)+1);
  // Hard cap: no one can rest more than base+1 regardless of circumstances
  const maxRests = base + 1;

  const stats=new Map(players.map(p=>[p.id,{plays:0,rests:0,lastRest:false,singlesPlays:0}]));
  const usedG=new Map(), usedSinglesPairs=new Map(), rounds_out=[], warnings=[];
  const startMin=cfg.slot==="21"?21*60+20:19*60;  // 19:00 or 21:20
  const fmt=t=>`${String(Math.floor(t/60)).padStart(2,"0")}:${String(t%60).padStart(2,"0")}`;

  for(let rNo=1;rNo<=rounds;rNo++){
    // Who must play (rested last round)
    const mustPlay=new Set(players.filter(p=>stats.get(p.id).lastRest).map(p=>p.id));
    const elig=players.filter(p=>!mustPlay.has(p.id));
    // Random jitter breaks ties between equally eligible players → different results each run
    const jitter=new Map(players.map(p=>[p.id,Math.random()]));
    elig.sort((a,b)=>{
      const na=tgt.get(a.id)-stats.get(a.id).rests, nb=tgt.get(b.id)-stats.get(b.id).rests;
      if(na!==nb)return nb-na;
      if(LR[a.level]!==LR[b.level])return LR[a.level]-LR[b.level];
      return jitter.get(a.id)-jitter.get(b.id); // random tiebreak
    });
    const resters=[];
    for(const p of elig){
      if(resters.length>=restPR)break;
      const s=stats.get(p.id);
      const t=tgt.get(p.id);
      // Hard cap: never let anyone exceed maxRests (base+1)
      if(s.rests>=maxRests) continue;
      const anyoneUnderTarget=elig.some(q=>!resters.includes(q)&&stats.get(q.id).rests<tgt.get(q.id)&&stats.get(q.id).rests<maxRests);
      if(s.rests<t||(s.rests===t&&!anyoneUnderTarget))resters.push(p);
    }
    if(resters.length<restPR){
      const ri=new Set(resters.map(p=>p.id));
      const remaining=elig.filter(p=>!ri.has(p.id)&&stats.get(p.id).rests<maxRests).sort((a,b)=>stats.get(a.id).rests-stats.get(b.id).rests||jitter.get(a.id)-jitter.get(b.id));
      for(const p of remaining){if(resters.length>=restPR)break;resters.push(p);}
    }
    const rIds=new Set(resters.map(p=>p.id));

    // Hard enforcement: anyone who has already reached maxRests MUST play this round
    // (override rester selection if needed — prevents exceeding base+1)
    const mustPlayDueToMaxRests = new Set(
      players.filter(p => stats.get(p.id).rests >= maxRests).map(p=>p.id)
    );
    // Remove from resters if they hit the cap
    const finalResters = resters.filter(p => !mustPlayDueToMaxRests.has(p.id));
    const finalResterIds = new Set(finalResters.map(p=>p.id));

    // Build pool (sorted: last-resters first, then fewest plays, then random tiebreak)
    let pool=players.filter(p=>!finalResterIds.has(p.id)).map(p=>({...p,meta:{...stats.get(p.id),target:tgt.get(p.id),maxRests}}));
    pool.sort((a,b)=>{
      if(a.meta.lastRest!==b.meta.lastRest)return a.meta.lastRest?-1:1;
      if(a.meta.plays!==b.meta.plays)return a.meta.plays-b.meta.plays;
      if(LR[a.level]!==LR[b.level])return LR[a.level]-LR[b.level];
      return jitter.get(a.id)-jitter.get(b.id); // random tiebreak
    });

    const courts_out=[];

    // ══════════════════════════════════════════════════════════════════════
    // SINGLES QUOTA  (21:00 slot only, preferSingle players only)
    // ──────────────────────────────────────────────────────────────────────
    // 19:00 slot  → always 0 (no singles ever)
    // 21:00 slot:
    //   n ≥ 23   → 0 singles courts
    //   19 ≤ n < 23 → max 1 singles court
    //   n < 19   → max 2 singles courts
    // ══════════════════════════════════════════════════════════════════════
    const maxSinglesCourts = (cfg.slot !== "21") ? 0
                           : (n >= 23)           ? 0
                           : (n >= 19)           ? 1
                           :                       2;

    // ── STEP 1: Singles FIRST — ONLY preferSingle===true players ─────────
    if(maxSinglesCourts > 0){
      const isSingleEligible = p => p.preferSingle === true || p.preferSingle === 1;
      const pairKey = (a,b) => [a.id,b.id].sort().join("|");
      const eligibleForSingles = pool.filter(isSingleEligible);

      let singlesTarget = 0;
      for(let s = 1; s <= maxSinglesCourts; s++){
        if(eligibleForSingles.length < s * 2) break;
        const afterSingles  = pool.length - s * 2;
        const doublesCourts = courts - s;
        if(doublesCourts > 0 && afterSingles < doublesCourts * 4) break;
        singlesTarget = s;
      }

      for(let i = 0; i < singlesTarget; i++){
        const avail = pool
          .filter(isSingleEligible)
          .sort((a,b) => {
            const spA = stats.get(a.id)?.singlesPlays ?? 0;
            const spB = stats.get(b.id)?.singlesPlays ?? 0;
            return spA !== spB ? spA - spB : (a.meta?.plays??0) - (b.meta?.plays??0);
          });
        if(avail.length < 2) break;
        const pr = pickPair(avail.slice(0, 8), avail, usedSinglesPairs, stats);
        if(!pr) break;
        courts_out.push({court: courts_out.length + 1, type:"Singles", players: pr});
        const pk = pairKey(pr[0], pr[1]);
        usedSinglesPairs.set(pk, (usedSinglesPairs.get(pk)??0) + 1);
        pr.forEach(p => { const s=stats.get(p.id); if(s) s.singlesPlays=(s.singlesPlays??0)+1; });
        const used = new Set(pr.map(p => p.id));
        pool = pool.filter(p => !used.has(p.id));
      }
    }

    // ── STEP 2: Fill remaining courts with doubles ─────────────────────
    // 19:00 must fill every configured court whenever enough players are available.
    // In force-fill mode the picker looks ahead, so it will keep M partners available
    // for B players instead of greedily using all non-B players first.
    const forceFill = cfg.slot === "19" ? n >= courts * 4 : n > 20;
    if(forceFill){
      while(courts_out.length < courts && pool.length >= 4){
        const g = pickForceGroup(pool, usedG, courts - courts_out.length);
        if(!g) break;
        courts_out.push({court:courts_out.length + 1, type:dType(g), players:g});
        markGroupUsed(usedG,g);
        const used=new Set(g.map(p=>p.id));
        pool=pool.filter(p=>!used.has(p.id));
      }
    } else {
      // n <= 20: fill what's possible, empty courts OK
      for(let c = courts_out.length + 1; c <= courts && pool.length >= 4; c++){
        const g = pickGroup(pool, usedG, cfg.slot);
        if(!g) break;
        courts_out.push({court:c, type:dType(g), players:g});
        markGroupUsed(usedG,g);
        const used=new Set(g.map(p=>p.id));
        pool=pool.filter(p=>!used.has(p.id));
      }
    }

    // ── STEP 3: Spare court fill ───────────────────────────────────────────
    // ONLY fills if preferSingle===true players are available. No fallback ever.
    // Respects max 2 repeats per singles pair.
    {
      const isSingleEligible = p => p.preferSingle === true || p.preferSingle === 1;
      const pairKey = (a,b) => [a.id,b.id].sort().join("|");
      const singlesNow = courts_out.filter(c => c.type === "Singles").length;
      if(courts_out.length < courts && singlesNow < maxSinglesCourts){
        const avail = pool
          .filter(isSingleEligible)
          .sort((a,b) => {
            const spA = stats.get(a.id)?.singlesPlays ?? 0;
            const spB = stats.get(b.id)?.singlesPlays ?? 0;
            return spA !== spB ? spA - spB : (a.meta?.plays??0) - (b.meta?.plays??0);
          });
        if(avail.length >= 2){
          const pr = pickPair(avail.slice(0, 8), avail, usedSinglesPairs, stats);
          if(pr){
            courts_out.push({court: courts_out.length + 1, type:"Singles", players: pr});
            const pk = pairKey(pr[0], pr[1]);
            usedSinglesPairs.set(pk, (usedSinglesPairs.get(pk)??0) + 1);
            pr.forEach(p => { const s=stats.get(p.id); if(s) s.singlesPlays=(s.singlesPlays??0)+1; });
            const used = new Set(pr.map(p => p.id));
            pool = pool.filter(p => !used.has(p.id));
          }
        }
      }
    }

    const playing=new Set(courts_out.flatMap(c=>c.players.map(p=>p.id)));
    players.forEach(p=>{const s=stats.get(p.id);if(playing.has(p.id)){s.plays++;s.lastRest=false}else{s.rests++;s.lastRest=true}});
    const t0=startMin+(rNo-1)*cfg.minutes, t1=startMin+rNo*cfg.minutes;
    rounds_out.push({round:rNo,time:`${fmt(t0)}–${fmt(t1)}`,courts:courts_out,resters:players.filter(p=>!playing.has(p.id))});
  }

  if(n>maxOnEst) warnings.push(`${n} players selected; max ${maxOnEst} per round — rest auto-balanced.`);
  // No fitness training warning — shown in settings panel instead

  return{slot:cfg.slot,rounds:rounds_out,warnings,playerStats:players.map(p=>({...p,...stats.get(p.id),target:tgt.get(p.id)}))};
}

function gKey(g){return g.map(p=>p.id).sort().join("|")}

function groupUseCount(used,g){
  const key=Array.isArray(g)?gKey(g):g;
  return used instanceof Map ? (used.get(key)||0) : (used?.has?.(key)?1:0);
}

function repeatGroupPenalty(used,g){
  const n=groupUseCount(used,g);
  if(n===0)return 0;
  if(n===1)return 90;
  if(n===2)return 160;
  return 900+(n-3)*300;
}

function markGroupUsed(used,g){
  const key=gKey(g);
  if(used instanceof Map) used.set(key,(used.get(key)||0)+1);
  else used.add(key);
}

function withoutGroup(pool,g){
  const ids=new Set(g.map(p=>p.id));
  return pool.filter(p=>!ids.has(p.id));
}

function canFillDoubles(pool,courtsNeeded,memo=new Map()){
  if(courtsNeeded<=0)return true;
  if(pool.length<courtsNeeded*4)return false;
  const key=`${courtsNeeded}:${pool.map(p=>p.id).sort().join(",")}`;
  if(memo.has(key))return memo.get(key);

  const exact=pool.length===courtsNeeded*4;
  const anchor=pool[0];
  let ok=false;
  for(let b=1;b<pool.length-2&&!ok;b++)for(let c=b+1;c<pool.length-1&&!ok;c++)for(let d=c+1;d<pool.length&&!ok;d++){
    const g=[anchor,pool[b],pool[c],pool[d]];
    if(illegal(g))continue;
    ok=canFillDoubles(withoutGroup(pool,g),courtsNeeded-1,memo);
  }
  if(!ok&&!exact)ok=canFillDoubles(pool.slice(1),courtsNeeded,memo);
  memo.set(key,ok);
  return ok;
}

function pickForceGroup(pool,used,courtsLeft){
  if(pool.length<4)return null;
  // Full look-ahead is only needed for normal club sizes. For very large imports,
  // fall back to the fast picker to keep the UI responsive.
  if(pool.length>32)return pickGroup(pool,used,"19");

  const candidates=[];
  for(let a=0;a<pool.length-3;a++)for(let b=a+1;b<pool.length-2;b++)for(let c=b+1;c<pool.length-1;c++)for(let d=c+1;d<pool.length;d++){
    const g=[pool[a],pool[b],pool[c],pool[d]];
    if(illegal(g))continue;
    candidates.push({g,s:score(g)+repeatGroupPenalty(used,g)});
  }
  candidates.sort((a,b)=>a.s-b.s);

  const memo=new Map();
  for(const cand of candidates){
    if(canFillDoubles(withoutGroup(pool,cand.g),courtsLeft-1,memo))return cand.g;
  }
  return candidates.length?candidates[0].g:null;
}

// HARD rule: only skip truly impossible combinations
// B+A1 diff=3 is hard-blocked; B+A2 diff=2 is now a soft penalty (allowed as last resort)
function illegal(g){
  const lvls=g.map(p=>LR[p.level]);
  const mn=Math.min(...lvls), mx=Math.max(...lvls);
  // Only hard-block diff ≥ 3 (B=1 vs A1=4)
  if(mx-mn>=3) return true;
  return false;
}

/*
 * Score — LOWER is better.
 *
 * Priority order:
 *  1. Level balance — B players should be with lowest available levels
 *     B+B+M+M = ideal for B players (spread=1) → small penalty
 *     B+A2 = large penalty (but allowed as last resort, no longer hard-blocked)
 *     B+A1 = hard-blocked (diff=3, illegal)
 *  2. Gender balance: 2+2 (XD/MD/WD) = 0, 3+1 = +500
 *  3. Repeat group penalty (soft; preferred over same-gender 2-level gaps)
 *  4. Fairness (fewer plays preferred)
 *  5. Rest bonus (rested last round preferred)
 */
function score(g){
  const r=g.map(p=>LR[p.level]||1).sort((a,b)=>a-b);
  const sp=r[3]-r[0];
  const hasB=g.some(p=>p.level==="B");

  // Level spread penalty
  // B players: ideal with other B or M (sp≤1), penalise heavily if with A2 (sp=2)
  // Others: sp=0 ideal, sp=1 small, sp=2 larger
  let lvlPenalty;
  if(hasB){
    lvlPenalty = sp===0 ? 0 : sp===1 ? 40 : 360; // B+A2 = last resort
  } else {
    lvlPenalty = sp===0 ? 0 : sp===1 ? 60 : 220;
  }

  // Same-gender 2-level gaps are worse than a moderate repeat.
  let sameGenderGapPenalty=0;
  for(let i=0;i<g.length-1;i++)for(let j=i+1;j<g.length;j++){
    if(g[i].gender===g[j].gender&&Math.abs((LR[g[i].level]||1)-(LR[g[j].level]||1))===2){
      sameGenderGapPenalty+=240;
    }
  }

  // Team balance: want (lo+hi) ≈ (mid1+mid2)
  const teamGap = Math.abs((r[0]+r[3])-(r[1]+r[2]));

  // Gender: 2+2 = 0, 3+1 = huge penalty
  const women=g.filter(p=>p.gender==="F").length;
  const genderPenalty = (women===1||women===3) ? 500 : 0;

  // Fairness: prefer players with fewer plays
  const fair=g.reduce((s,p)=>s+(p.meta?.plays??0)*4-(p.meta?.rests??0)*14,0);

  // Rest bonus: strongly prefer those who rested last round
  const restBonus=-g.filter(p=>p.meta?.lastRest).length*30;

  return lvlPenalty + sameGenderGapPenalty + teamGap*10 + genderPenalty + fair + restBonus;
}

function dType(g){const w=g.filter(p=>p.gender==="F").length;return w===4?"WD":w===0?"MD":w===2?"XD":"Doubles"}

function pickGroup(pool,used,forceSlot){
  if(pool.length<4)return null;
  const shuffled = pool.slice();
  for(let i=shuffled.length-1;i>0;i--){
    const j=Math.floor(Math.random()*(i+1));
    [shuffled[i],shuffled[j]]=[shuffled[j],shuffled[i]];
  }
  shuffled.sort((a,b)=>{
    if(a.meta?.lastRest!==b.meta?.lastRest)return a.meta?.lastRest?-1:1;
    if((a.meta?.plays??0)!==(b.meta?.plays??0))return (a.meta?.plays??0)-(b.meta?.plays??0);
    return LR[a.level]-LR[b.level];
  });
  // 19:00: search full pool to ensure courts are always filled
  // 21:00: limit to 12 for speed
  const windowSize = forceSlot==="19" ? shuffled.length : Math.min(shuffled.length,12);
  const lim=shuffled.slice(0,windowSize);
  let best=null,bsc=Infinity;
  for(let a=0;a<lim.length-3;a++)for(let b=a+1;b<lim.length-2;b++)for(let c=b+1;c<lim.length-1;c++)for(let d=c+1;d<lim.length;d++){
    const g=[lim[a],lim[b],lim[c],lim[d]];
    if(illegal(g))continue;
    const s=score(g)+repeatGroupPenalty(used,g);
    if(s<bsc){best=g;bsc=s;}
  }
  // If no legal group found (only happens when only B+A1 players remain),
  // return null — court stays empty, players rest. This is acceptable.
  return best;
}
function pickPair(candidates, fullPool, usedPairs, statsMap){
  const el = (candidates && candidates.length >= 2) ? candidates : (fullPool||[]);
  if(el.length < 2) return null;
  const pKey = (a,b) => [a.id,b.id].sort().join("|");
  let best = null, bsc = Infinity;
  for(let i = 0; i < el.length-1; i++)
  for(let j = i+1; j < el.length; j++){
    const a = el[i], b = el[j];
    const lvlDiff = Math.abs(LR[a.level] - LR[b.level]);
    const lvlPenalty = lvlDiff === 0 ? 0 : lvlDiff === 1 ? 30 : 200;
    let genderPenalty = 0;
    if(a.gender !== b.gender){
      const male = a.gender==="M"?a:b, female = a.gender==="F"?a:b;
      genderPenalty = LR[male.level]<=LR[female.level] ? 50+lvlDiff*20 : 300;
    }
    const timesUsed = usedPairs ? (usedPairs.get(pKey(a,b))??0) : 0;
    const repeatPenalty = timesUsed>=2 ? 9999 : timesUsed===1 ? 80 : 0;
    const spA = statsMap ? (statsMap.get(a.id)?.singlesPlays??0) : 0;
    const spB = statsMap ? (statsMap.get(b.id)?.singlesPlays??0) : 0;
    const s = lvlPenalty + genderPenalty + repeatPenalty + (spA+spB)*10;
    if(s < bsc){ best=[a,b]; bsc=s; }
  }
  return bsc >= 9999 ? null : best;
}

function updateAttStats(){
  const m=pMap(), sel=new Set((ss.selectedIds||[]).filter(id=>m.has(id)));
  const sp=[...sel].map(id=>m.get(id));
  const cap=ss.maxPlayers, atCap=sp.length>=cap;

  // Update stat boxes

  if(statEls.length>=4){
    statEls[0].textContent=`Selected: ${sp.length} / ${cap}`;
    statEls[1].textContent=`M/F: ${sp.filter(p=>p.gender==="M").length}/${sp.filter(p=>p.gender==="F").length}`;
    statEls[2].textContent=`Singles: ${sp.filter(p=>p.preferSingle).length}`;
    const capEl=statEls[3];
    if(sp.length>cap){
      capEl.textContent=`⚠ Over by ${sp.length-cap}`;
      capEl.className="stat-box rounded-lg border px-3 py-2 text-sm border-amber-200 bg-amber-50 text-amber-700";
    } else if(atCap){
      capEl.textContent=`✓ Full (${cap})`;
      capEl.className="stat-box rounded-lg border px-3 py-2 text-sm border-emerald-200 bg-emerald-50 text-emerald-700";
    } else {
      capEl.textContent=`✓ Capacity OK`;
      capEl.className="stat-box rounded-lg border px-3 py-2 text-sm border-slate-200 bg-slate-50";
    }
  }

  // Update checkboxes: check state, color, and disable unselected when full
  document.querySelectorAll(".att-cb").forEach(cb=>{
    const checked=sel.has(cb.dataset.id);
    cb.checked=checked;
    // Disable unchecked boxes when at capacity (can't add more)
    cb.disabled = !checked && atCap;
    const lbl=cb.closest("label");
    lbl.className="rounded-lg border px-3 py-2 flex items-center gap-3 "+(
      checked?"border-emerald-300 bg-emerald-50 cursor-pointer hover:bg-emerald-100":
      atCap?"border-slate-100 bg-slate-50 opacity-40 cursor-not-allowed":
      "border-slate-200 bg-white cursor-pointer hover:bg-slate-50"
    );
  });
}

        h+=`<div class="px-3 py-2.5 bg-white">

            <div class="text-xs text-slate-500 font-medium">Court ${c.court}</div>
            <div class="text-[10px] font-bold px-1.5 py-0.5 rounded-full ${badge}">${c.type}</div>
          </div>
          <div class="flex flex-wrap gap-1">${c.players.map(p=>`<span class="text-xs px-1.5 py-0.5 rounded-md font-medium ${p.gender==="F"?"bg-red-100 text-red-700":"bg-blue-100 text-blue-700"}">${esc(p.name)}</span>`).join("")}</div>
        </div>`;
      });
      h+=`</div>
        <div class="px-3 py-2 bg-slate-50 border-t border-slate-100">
          <div class="text-[10px] font-semibold text-slate-400 uppercase tracking-wide mb-1">Resting</div>
          <div class="flex flex-wrap gap-1">${r.resters.length?r.resters.map(p=>`<span class="text-xs px-1.5 py-0.5 rounded-md bg-slate-200 text-slate-600">${esc(p.name)}</span>`).join(""):`<span class="text-xs text-slate-400">None</span>`}</div>
        </div>
      </div>`;
    });
    return h;
  }

  let body=`
  <div class="rounded-xl border border-slate-200 bg-white p-4">
    <div class="flex flex-col sm:flex-row sm:items-center justify-between gap-3">
      <div class="flex items-center gap-3 flex-wrap">
        <div>
          <div class="font-semibold">Match Schedule</div>
          <div class="text-sm text-slate-500 mt-0.5">${selCnt} players · ${viewSS.courts} courts · ${viewSS.rounds} rounds</div>
        </div>
        <!-- Slot switcher inside Schedule tab -->
        <div class="inline-flex rounded-lg border border-slate-200 bg-slate-50 p-1">
          <button id="schSlot19" class="px-3 py-1 text-sm rounded-md ${scheduleViewSlot==="19"?"bg-slate-900 text-white":"text-slate-600 hover:bg-slate-100"}">19:00</button>
          <button id="schSlot21" class="px-3 py-1 text-sm rounded-md ${scheduleViewSlot==="21"?"bg-slate-900 text-white":"text-slate-600 hover:bg-slate-100"}">21:20</button>
        </div>
      </div>
      <div class="no-print flex flex-wrap gap-2 items-center">
        <div class="flex items-center gap-1 rounded-lg border border-slate-200 bg-slate-50 px-2 py-1">
          <button id="histPrevBtn" class="px-2 py-0.5 rounded text-slate-600 hover:bg-slate-200 text-sm font-bold ${!isFromHistory||hist.length<=1||idx===0?"opacity-30 cursor-not-allowed":""}" ${!isFromHistory||hist.length<=1||idx===0?"disabled":""}>←</button>
          <span class="text-xs text-slate-500 px-1">${isFromHistory&&hist.length>0?`${idx+1} / ${hist.length}`:"— / —"}</span>
          <button id="histNextBtn" class="px-2 py-0.5 rounded text-slate-600 hover:bg-slate-200 text-sm font-bold ${!isFromHistory||hist.length<=1||idx===hist.length-1?"opacity-30 cursor-not-allowed":""}" ${!isFromHistory||hist.length<=1||idx===hist.length-1?"disabled":""}>→</button>
        </div>
        <button id="useThisBtn" class="px-3 py-1.5 rounded-lg text-sm font-medium border ${isFromHistory&&idx!==hist.length-1?"bg-emerald-600 text-white border-emerald-600 hover:bg-emerald-700":"bg-slate-100 text-slate-400 border-slate-200 cursor-not-allowed"}" ${!isFromHistory||idx===hist.length-1?"disabled":""}>${isFromHistory&&idx!==hist.length-1?"✓ Use This":"✓ Selected"}</button>
        <button id="copyBtn" class="px-3 py-1.5 rounded-lg border border-slate-200 bg-white text-sm hover:bg-slate-50">Copy Text</button>
        <button id="printBtn" class="px-3 py-1.5 rounded-lg border border-slate-200 bg-white text-sm hover:bg-slate-50">Print</button>
        <button id="regenBtn" class="px-3 py-1.5 rounded-lg bg-slate-900 text-white text-sm hover:bg-slate-700">⚡ Re-generate</button>
      </div>
    </div>`;

  // No fitness training notice in schedule tab — shown in attendance settings panel only

  if(!sch){
    body+=`<div class="mt-4 rounded-lg border border-slate-200 bg-slate-50 px-3 py-4 text-slate-500">No schedule for this slot yet. Go to Attendance, select ${scheduleViewSlot}:00, and click Generate.</div></div>`;
    $("tab3").innerHTML=body;
    $("schSlot19").addEventListener("click",()=>renderScheduleTab("19"));
    $("schSlot21").addEventListener("click",()=>renderScheduleTab("21"));
    $("regenBtn").addEventListener("click",()=>{setSlot(scheduleViewSlot);setTab("tab1");render()});
    return;
  }

  // Warnings (no-print)
  // Warnings suppressed — info shown in settings panel

  // Round cards — wrapped in printArea
  body+=`<div id="printArea" class="mt-4 grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-3">${roundsHTML(sch)}</div>`;

  // Player summary (no-print)
  if(sch.playerStats){
    body+=`<div class="no-print mt-6 font-semibold">Player Summary / Rest Equity</div>
    <div class="no-print text-xs text-slate-400 mt-0.5 mb-3">Green = at target · Orange = over target. Max spread ≤ 1 round; weakest players get the extra rest when needed.</div>
    <div class="no-print grid grid-cols-1 sm:grid-cols-2 gap-2">`;
    [...sch.playerStats].sort((a,b)=>b.plays-a.plays||a.name.localeCompare(b.name)).forEach(p=>{
      const pct=viewSS.rounds>0?Math.min((p.rests/viewSS.rounds)*100,100):0;
      const over=p.rests>p.target;
      body+=`<div class="rounded-lg border border-slate-100 bg-white px-3 py-2 flex items-center gap-3">
        <div class="min-w-[90px] text-sm font-medium truncate">${esc(p.name)}</div>
        <div class="text-xs text-slate-400 w-14 flex-shrink-0">${LL[p.level]||p.level}</div>
        <div class="flex-1 bg-slate-100 rounded-full h-2 overflow-hidden"><div class="h-2 rounded-full ${over?"bg-amber-400":"bg-emerald-500"}" style="width:${pct.toFixed(0)}%"></div></div>
        <div class="text-xs text-slate-500 w-24 text-right flex-shrink-0">${p.plays}▶ ${p.rests}⏸ (tgt ${p.target})</div>
      </div>`;
    });
    body+=`</div>`;
  }

  body+=`</div>`;
  $("tab3").innerHTML=body;

  $("schSlot19").addEventListener("click",()=>renderScheduleTab("19"));
  $("schSlot21").addEventListener("click",()=>renderScheduleTab("21"));

  // History navigation
  if($("histPrevBtn")) $("histPrevBtn").addEventListener("click",()=>{
    scheduleHistoryIdx[scheduleViewSlot] = Math.max(0, idx-1);
    renderScheduleTab();
  });
  if($("histNextBtn")) $("histNextBtn").addEventListener("click",()=>{
    scheduleHistoryIdx[scheduleViewSlot] = Math.min(hist.length-1, idx+1);
    renderScheduleTab();
  });
  // Use This: set current history item as the active schedule
  if($("useThisBtn")) $("useThisBtn").addEventListener("click",()=>{
    const chosen = hist[scheduleHistoryIdx[scheduleViewSlot]];
    const vss = loadSlot(scheduleViewSlot);
    vss.schedule = chosen;
    saveSlot(vss);
    // Move to end of history so it's "current"
    hist.splice(scheduleHistoryIdx[scheduleViewSlot], 1);
    hist.push(chosen);
    if(hist.length > 5) hist.shift();
    scheduleHistoryIdx[scheduleViewSlot] = hist.length - 1;
    toast("Schedule set as active!","success");
    renderScheduleTab();
  });
  $("copyBtn").addEventListener("click",async()=>{
    const lines=[`ACE Badminton Schedule — ${scheduleViewSlot==='19'?'19:00':'21:20'}`,""];
    sch.rounds.forEach(r=>{
      lines.push(`Round ${r.round} (${r.time})`);
      r.courts.forEach(c=>lines.push(`  Court${c.court} [${c.type}]: ${c.players.map(p=>p.name).join(" / ")}`));
      lines.push(`  Rest: ${r.resters.length?r.resters.map(p=>p.name).join(", "):"None"}`,"");
    });
    const text = lines.join("\n");
    // Try modern clipboard API first, fall back to execCommand for mobile/file://
    try {
      await navigator.clipboard.writeText(text);
      toast("Copied!","success");
    } catch {
      try {
        const ta = document.createElement("textarea");
        ta.value = text;
        ta.style.cssText = "position:fixed;top:0;left:0;opacity:0;";
        document.body.appendChild(ta);
        ta.focus(); ta.select();
        document.execCommand("copy");
        document.body.removeChild(ta);
        toast("Copied!","success");
      } catch {
        toast("Copy failed — please copy manually","error");
      }
    }
  });
  $("printBtn").addEventListener("click",()=>{
    if(!sch){toast("No schedule to print","error");return}
    const rounds=sch.rounds.length;
    const cols=rounds<=3?rounds:rounds<=4?4:rounds<=6?3:4;
    const rows=Math.ceil(rounds/cols);
    // Round card HTML builder
    function pRound(r){
      const courts=r.courts.map(c=>{
        const bCls=c.type==="XD"?"xd":c.type==="MD"?"md":c.type==="WD"?"wd":c.type==="Singles"?"sg":"db";
        const ps=c.players.map(p=>`<span class="pm ${p.gender==="F"?"pm-f":"pm-m"}">${p.name}</span>`).join("");
        return`<div class="court"><div class="ctitle"><span class="clabel">Court ${c.court}</span><span class="badge ${bCls}">${c.type}</span></div><div class="names">${ps}</div></div>`;
      }).join("");
      const rps=r.resters.length?r.resters.map(p=>`<span class="rp">${p.name}</span>`).join(""):`<span class="rp" style="color:#cbd5e1">None</span>`;
      const playing=r.courts.reduce((s,c)=>s+c.players.length,0);
      return`<div class="round">
        <div class="rhead"><strong>Round ${r.round}</strong><span>${r.time} · ${playing} playing${r.resters.length?" · "+r.resters.length+" resting":""}</span></div>
        <div class="courts">${courts}</div>
        <div class="rest"><div class="rlabel">Resting</div><div class="rnames">${rps}</div></div>
      </div>`;
    }
    const cardsHTML=sch.rounds.map(pRound).join("");

    // In-page print: inject a style that hides everything except our print div
    // Works on all browsers including mobile without popup/iframe issues
    const old = document.getElementById("_printStyle");
    if(old) old.remove();
    const oldDiv = document.getElementById("_printDiv");
    if(oldDiv) oldDiv.remove();

    // Create a hidden div with styled print content
    const printDiv = document.createElement("div");
    printDiv.id = "_printDiv";
    printDiv.style.cssText = "display:none;";
    printDiv.innerHTML = `<h1 style="font-size:10px;font-weight:700;margin-bottom:3px;font-family:system-ui,Arial,sans-serif;">ACE Badminton Schedule &mdash; ${scheduleViewSlot}:00 &nbsp;&middot;&nbsp; ${sch.rounds[0]?.time?.split("–")[0]||""} to ${sch.rounds[sch.rounds.length-1]?.time?.split("–")[1]||""}</h1><div class="_pgrid">${cardsHTML}</div>`;
    document.body.appendChild(printDiv);

    const style = document.createElement("style");
    style.id = "_printStyle";
    style.textContent = `
      @media print {
        @page{size:A4 landscape;margin:6mm}
        body > *{display:none!important}
        #_printDiv{
          display:block!important;
          font-family:system-ui,Arial,sans-serif;
          font-size:9px;
          -webkit-print-color-adjust:exact;
          print-color-adjust:exact;
          height:210mm;
          overflow:hidden;
        }
        ._pgrid{display:grid;grid-template-columns:repeat(${cols},1fr);gap:3px;height:calc(210mm - 18mm);overflow:hidden}
        ._pgrid .round{border:1px solid #e2e8f0;border-radius:5px;overflow:hidden;display:flex;flex-direction:column;min-height:0}
        ._pgrid .rhead{background:#f0fdf4;border-bottom:1px solid #bbf7d0;padding:3px 6px;display:flex;justify-content:space-between;align-items:center;flex-shrink:0}
        ._pgrid .rhead strong{font-size:9px;font-weight:700}
        ._pgrid .rhead span{font-size:7.5px;color:#64748b}
        ._pgrid .courts{flex:1;overflow:hidden;display:flex;flex-direction:column;justify-content:space-evenly}
        ._pgrid .court{padding:2px 6px;border-bottom:1px solid #f1f5f9}
        ._pgrid .court:last-child{border-bottom:none}
        ._pgrid .ctitle{display:flex;justify-content:space-between;align-items:center;margin-bottom:1px}
        ._pgrid .clabel{font-size:7.5px;font-weight:600;color:#94a3b8}
        ._pgrid .badge{font-size:7px;font-weight:700;padding:0 4px;border-radius:99px;border:1px solid;line-height:1.6}
        ._pgrid .xd{background:#f5f3ff;color:#7c3aed;border-color:#c4b5fd}
        ._pgrid .md{background:#eff6ff;color:#1d4ed8;border-color:#93c5fd}
        ._pgrid .wd{background:#fdf2f8;color:#be185d;border-color:#f9a8d4}
        ._pgrid .db{background:#f0fdf4;color:#15803d;border-color:#86efac}
        ._pgrid .sg{background:#fffbeb;color:#b45309;border-color:#fcd34d}
        ._pgrid .names{display:flex;flex-wrap:wrap;gap:2px}
        ._pgrid .pm{font-size:8px;padding:0 4px;border-radius:3px;font-weight:600;line-height:1.6}
        ._pgrid .pm-f{background:#fee2e2;color:#b91c1c}
        ._pgrid .pm-m{background:#dbeafe;color:#1d4ed8}
        ._pgrid .rest{padding:2px 6px;background:#f8fafc;border-top:1px solid #e2e8f0;flex-shrink:0}
        ._pgrid .rlabel{font-size:7px;font-weight:700;color:#94a3b8;text-transform:uppercase;letter-spacing:.05em;margin-bottom:1px}
        ._pgrid .rnames{display:flex;flex-wrap:wrap;gap:2px}
        ._pgrid .rp{font-size:7.5px;padding:0 3px;border-radius:3px;background:#e2e8f0;color:#475569;line-height:1.6}
      }
    `;
    document.head.appendChild(style);

    window.print();

    // Clean up after print dialog closes
    setTimeout(()=>{
      style.remove();
      printDiv.remove();
    }, 1000);
  });
  $("regenBtn").addEventListener("click",()=>{
    const vss = loadSlot(scheduleViewSlot);
    const sp2 = vss.selectedIds.map(id=>pMap().get(id)).filter(Boolean);
    if(sp2.length < 4){toast("Not enough players selected","error");return}
    try{
      const result = buildSchedule(sp2,{slot:scheduleViewSlot,courts:vss.courts,rounds:vss.rounds,minutes:vss.minutes});
      const h = scheduleHistory[scheduleViewSlot];
      h.push(result);
      if(h.length > 5) h.shift();
      scheduleHistoryIdx[scheduleViewSlot] = h.length - 1;
      vss.schedule = result; saveSlot(vss);
      if(scheduleViewSlot === slot) ss = vss;
      renderScheduleTab();
      toast(`Version ${h.length} generated${h.length>1?" — use ← to compare":""}`, "success");
    }catch(e){
      toast("Generation failed: "+e.message,"error");
    }
  });
}

// TAB 4 — Payments
function renderPayments(){
  const pm=pMap();
  const ids19=new Set(loadSlot("19").selectedIds.filter(id=>pm.has(id)));
  const ids21=new Set(loadSlot("21").selectedIds.filter(id=>pm.has(id)));
  const allIds=[...new Set([...ids19,...ids21])];
  const pay=loadPay();

  if(!allIds.length){
    $("tab4").innerHTML=`<div class="rounded-xl border border-slate-200 bg-white p-4">
      <div class="font-semibold">Payments</div>
      <div class="mt-3 text-slate-500">No attending players. Select players in Attendance tab first.</div></div>`;
    return;
  }

  const rows=allIds.map(id=>{
    const p=pm.get(id),rec=pay[id]||{};
    // U18 comes from player profile, not payment record
    const u18=p.u18===true||p.u18===1,paid=Boolean(rec.paid),a19=ids19.has(id),a21=ids21.has(id);
    const sess=Number(a19)+Number(a21),rate=u18?30:50,due=sess*rate;
    return{id,name:p.name,u18,paid,a19,a21,sess,due};
  }).sort((a,b)=>b.sess-a.sess||a.name.localeCompare(b.name));

  const total=rows.reduce((s,r)=>s+r.due,0);
  const collected=rows.reduce((s,r)=>s+(r.paid?r.due:0),0);
  const paidCnt=rows.filter(r=>r.paid).length;

  $("tab4").innerHTML=`
  <div class="rounded-xl border border-slate-200 bg-white p-4">
    <div class="font-semibold">Payments</div>
    <div class="text-sm text-slate-500 mt-0.5">Both slots combined. U18 rate set in player profile (R30). Adult rate R50.</div>
    <div class="mt-3 flex flex-wrap gap-2">
      ${[`Players: ${rows.length}`,`Paid: ${paidCnt}/${rows.length}`,`Due: ${fmtMoney(total)}`,`Collected: ${fmtMoney(collected)}`,`Outstanding: ${fmtMoney(total-collected)}`].map(t=>`<div class="rounded-lg border border-slate-200 bg-slate-50 px-3 py-2 text-sm">${t}</div>`).join("")}
    </div>
    <button id="exPayBtn" class="mt-3 px-3 py-1.5 rounded-lg bg-slate-900 text-white text-sm hover:bg-slate-700">Export Excel</button>

    <!-- Mobile list -->
    <div class="mt-4 space-y-2 sm:hidden">
      ${rows.map(r=>`<div class="rounded-xl border border-slate-200 bg-white px-3 py-2.5 flex items-center gap-1.5">
        <div class="font-semibold text-sm truncate w-20 flex-shrink-0">${esc(r.name)}</div>
        ${r.u18?`<span class="text-xs px-1.5 py-0.5 rounded bg-amber-100 text-amber-700 font-semibold flex-shrink-0">U18</span>`:`<span class="w-8 flex-shrink-0"></span>`}
        <div class="text-xs text-slate-400 flex-shrink-0">${[r.a19?"19":null,r.a21?"21":null].filter(Boolean).join("+")}</div>
        <div class="text-sm font-semibold flex-1 text-right flex-shrink-0">${fmtMoney(r.due)}</div>
        <button class="pay-btn flex-shrink-0 ml-1 px-2 py-1 rounded-lg text-xs font-bold border ${r.paid?"bg-emerald-50 text-emerald-700 border-emerald-200":"bg-rose-50 text-rose-700 border-rose-200"}" data-id="${r.id}">${r.paid?"PAID":"UNPAID"}</button>
      </div>`).join("")}
    </div>

    <!-- Desktop table -->
    <div class="mt-4 overflow-x-auto hidden sm:block">
      <table class="w-full text-sm border-collapse">
        <thead><tr>${["Name","U18","19:00","21:00","Sessions","Rate","Due","Status"].map(h=>`<th class="px-3 py-2 text-left text-xs font-semibold text-slate-600 border-b border-slate-200 bg-slate-50">${h}</th>`).join("")}</tr></thead>
        <tbody>${rows.map(r=>`<tr class="border-b border-slate-100 last:border-0 hover:bg-slate-50">
          <td class="px-3 py-2 font-medium">${esc(r.name)}</td>
          <td class="px-3 py-2">${r.u18?`<span class="text-xs px-1.5 py-0.5 rounded bg-amber-100 text-amber-700 font-semibold">U18</span>`:"-"}</td>
          <td class="px-3 py-2">${r.a19?"✓":"-"}</td>
          <td class="px-3 py-2">${r.a21?"✓":"-"}</td>
          <td class="px-3 py-2">${r.sess}</td>
          <td class="px-3 py-2">${fmtMoney(r.u18?30:50)}</td>
          <td class="px-3 py-2 font-medium">${fmtMoney(r.due)}</td>
          <td class="px-3 py-2"><button class="pay-btn px-2.5 py-1 rounded text-xs font-bold border ${r.paid?"bg-emerald-50 text-emerald-700 border-emerald-200":"bg-rose-50 text-rose-700 border-rose-200"}" data-id="${r.id}">${r.paid?"PAID":"UNPAID"}</button></td>
        </tr>`).join("")}</tbody>
      </table>
    </div>
    <div class="mt-3 text-xs text-slate-400">Rates: Adult R50 · Under-18 R30 per slot.</div>
  </div>`;

  document.querySelectorAll(".pay-btn").forEach(btn=>btn.addEventListener("click",()=>{
    const p=loadPay();p[btn.dataset.id]={...p[btn.dataset.id],paid:!Boolean(p[btn.dataset.id]?.paid)};savePay(p);renderPayments();
  }));
  $("exPayBtn").addEventListener("click",()=>{
    if(!window.XLSX){toast("XLSX unavailable","error");return}
    const ws=XLSX.utils.json_to_sheet(rows.map(r=>({Name:r.name,Under18:r.u18?1:0,"19:00":r.a19?"Y":"-","21:00":r.a21?"Y":"-",Sessions:r.sess,Rate:r.u18?30:50,Due:r.due,Paid:r.paid?"Y":"N"})));
    const wb=XLSX.utils.book_new();XLSX.utils.book_append_sheet(wb,ws,"Payments");
    XLSX.writeFile(wb,`ace-payments-${new Date().toISOString().slice(0,10)}.xlsx`);
  });
}

// ── Player dialog ──────────────────────────────────────────────────────────
function openDlg(p){
  editingId=p?p.id:null;
  $("dlgTitle").textContent=p?"Edit Player":"Add Player";
  $("dlgName").value=p?p.name:"";
  $("dlgGender").value=p?p.gender:"M";
  $("dlgLevel").value=p?p.level:"M";
  $("dlgSingles").checked=p?p.preferSingle:false;
  $("dlgU18").checked=p?(p.u18===true||p.u18===1):false;
  $("playerDialog").showModal();
}
function closeDlg(){$("playerDialog").close();editingId=null}
$("dlgClose").addEventListener("click",closeDlg);
$("dlgCancel").addEventListener("click",closeDlg);
$("dlgSave").addEventListener("click",()=>{
  const name=$("dlgName").value.trim();
  if(!name){toast("Name required","error");return}
  if(!editingId&&players.some(p=>p.name.toLowerCase()===name.toLowerCase())){toast("Name already exists","error");return}
  const p={id:editingId||stableId(name),name,gender:$("dlgGender").value,level:$("dlgLevel").value,preferSingle:$("dlgSingles").checked,u18:$("dlgU18").checked};
  const idx=players.findIndex(x=>x.id===p.id);
  if(idx>=0)players[idx]=p;else players.push(p);
  savePlayers(players);closeDlg();renderPlayers();
});

// ── Import/export helpers ──────────────────────────────────────────────────
function exportPlayerXls(){
  if(!window.XLSX){toast("XLSX unavailable","error");return}
  const ws=XLSX.utils.json_to_sheet(players.map(p=>({Name:p.name,Gender:p.gender,Level:p.level,Singles:p.preferSingle?1:0,U18:p.u18?1:0})));
  const wb=XLSX.utils.book_new();XLSX.utils.book_append_sheet(wb,ws,"Players");
  XLSX.writeFile(wb,"ace-players.xlsx");
}
async function importPlayerXls(file){
  if(!window.XLSX){toast("XLSX unavailable","error");return}
  try{
    const buf=await file.arrayBuffer();
    const wb=XLSX.read(buf,{type:"array"});
    const rows=XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]],{defval:""});
    const byName=new Map(players.map(p=>[p.name.toLowerCase(),p]));
    let added=0;
    rows.forEach(r=>{
      const name=String(r.Name||r.name||"").trim();if(!name)return;
      const lvl=LEVELS.includes(r.Level||r.level)?r.Level||r.level:"M";
      const gen=r.Gender==="F"||r.gender==="F"?"F":"M";
      const key=name.toLowerCase();
      if(!byName.has(key)){const p={id:stableId(name),name,gender:gen,level:lvl,preferSingle:r.Singles===1||r.Singles===true||r.singles===1||r.singles===true,u18:r.U18===1||r.U18===true||r.u18===1||r.u18===true};players.push(p);byName.set(key,p);added++;}
      else{const p=byName.get(key);p.gender=gen;p.level=lvl;p.preferSingle=r.Singles===1||r.Singles===true||r.singles===1||r.singles===true;p.u18=r.U18===1||r.U18===true||r.u18===1||r.u18===true;}
    });
    savePlayers(players);toast(`Imported, ${added} new player(s).`,"success");renderPlayers();
  }catch(e){toast("Import failed: "+e.message,"error")}
}
function exportAttendance(){
  if(!window.XLSX){toast("XLSX unavailable","error");return}
  const m=pMap(),sel=[...(ss.selectedIds||[])].map(id=>m.get(id)).filter(Boolean);
  if(!sel.length){toast("No players selected","error");return}
  const ws=XLSX.utils.json_to_sheet(sel.map(p=>({Name:p.name,Gender:p.gender,Level:p.level})));
  const wb=XLSX.utils.book_new();XLSX.utils.book_append_sheet(wb,ws,"Attendance");
  XLSX.writeFile(wb,`ace-att-${slot}00-${new Date().toISOString().slice(0,10)}.xlsx`);
  toast("Attendance exported","success");
}
async function importAttendance(file){
  if(!window.XLSX){toast("XLSX unavailable","error");return}
  try{
    const buf=await file.arrayBuffer();
    const wb=XLSX.read(buf,{type:"array"});
    const rows=XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]],{defval:""});
    const byName=new Map(players.map(p=>[p.name.toLowerCase(),p.id]));
    const matched=[],missing=[];
    rows.forEach(r=>{
      const n=String(r.Name||r.name||"").trim();
      if(!n)return;
      const id=byName.get(n.toLowerCase());
      if(id)matched.push(id);else missing.push(n);
    });
    if(matched.length===0){
      toast(`No matching players found.${missing.length?" Names: "+missing.slice(0,5).join(", "):""}`, "error");
      return;
    }
    // Reload fresh from storage to avoid stale ss state
    const fresh = loadSlot(slot);
    const newSel = new Set([...fresh.selectedIds, ...matched]);
    fresh.selectedIds = [...newSel].slice(0, fresh.maxPlayers);
    fresh.schedule = null;
    saveSlot(fresh);
    ss = fresh; // update global ss
    toast(`Imported ${matched.length} player(s) into ${slot}:00.${missing.length?" Not found: "+missing.join(", "):""}`, missing.length?"info":"success");
    renderAttendance();
  }catch(e){toast("Import failed: "+e.message,"error")}
}

  else if(tab==="tab2")renderPlayers();

}
